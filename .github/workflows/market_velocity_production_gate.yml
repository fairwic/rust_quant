name: Market Velocity Production Gate

on:
  workflow_dispatch:
    inputs:
      buyer_email:
        description: "Target buyer email"
        required: true
        type: string
      combo_id:
        description: "Target combo id"
        required: true
        type: string
      credential_id:
        description: "Web API credential id for readiness refresh"
        required: false
        type: string
      event_id:
        description: "Optional market_rank_events id"
        required: false
        type: string
      lookback_hours:
        description: "Candidate lookback hours"
        required: true
        default: "24"
        type: string
      candidate_limit:
        description: "Candidate limit"
        required: true
        default: "20"
        type: string

permissions:
  contents: read

jobs:
  production-gate:
    name: Production Gate
    runs-on: ubuntu-24.04
    environment:
      name: production
    concurrency:
      group: quant-core-market-velocity-production-gate
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ./scripts/ci/prepare_ssh.sh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Run Rust-native production gate
        env:
          DEPLOY_SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.SSH_PORT }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE || 'docker-compose.deploy.yml' }}
          MARKET_VELOCITY_LIVE_BUYER_EMAIL: ${{ inputs.buyer_email }}
          MARKET_VELOCITY_LIVE_COMBO_ID: ${{ inputs.combo_id }}
          MARKET_VELOCITY_TASK_READINESS_CREDENTIAL_ID: ${{ inputs.credential_id }}
          MARKET_VELOCITY_SIGNAL_EVENT_ID: ${{ inputs.event_id }}
          MARKET_VELOCITY_SIGNAL_LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          MARKET_VELOCITY_LIVE_CANDIDATE_LIMIT: ${{ inputs.candidate_limit }}
        run: |
          set -euo pipefail

          : "${DEPLOY_SSH_USER:?DEPLOY_SSH_USER is required}"
          : "${DEPLOY_SSH_HOST:?DEPLOY_SSH_HOST is required}"
          : "${SERVER_APP_PATH:?SERVER_APP_PATH is required}"
          : "${MARKET_VELOCITY_LIVE_BUYER_EMAIL:?buyer_email is required}"
          : "${MARKET_VELOCITY_LIVE_COMBO_ID:?combo_id is required}"

          ssh_host_input="${DEPLOY_SSH_HOST}"
          ssh_port="${DEPLOY_SSH_PORT:-22}"
          ssh_host="${ssh_host_input}"
          if [[ "${ssh_host_input}" == *"@"* ]]; then
            echo "DEPLOY_SSH_HOST must not include a username. Set DEPLOY_SSH_USER separately." >&2
            exit 1
          fi
          if [[ "${ssh_host_input}" =~ ^\[([^]]+)\]:(.+)$ ]]; then
            if [[ -z "${DEPLOY_SSH_PORT:-}" ]]; then
              ssh_port="${BASH_REMATCH[2]}"
            fi
            ssh_host="${BASH_REMATCH[1]}"
          elif [[ "${ssh_host_input}" =~ ^([^:]+):([0-9]+)$ ]]; then
            if [[ -z "${DEPLOY_SSH_PORT:-}" ]]; then
              ssh_port="${BASH_REMATCH[2]}"
            fi
            ssh_host="${BASH_REMATCH[1]}"
          fi

          remote_compose_file=".deploy/current.$(basename "${DEPLOY_COMPOSE_FILE}")"

          ssh -p "${ssh_port}" "${DEPLOY_SSH_USER}@${ssh_host}" \
            env \
            "MARKET_VELOCITY_LIVE_BUYER_EMAIL=${MARKET_VELOCITY_LIVE_BUYER_EMAIL}" \
            "MARKET_VELOCITY_LIVE_COMBO_ID=${MARKET_VELOCITY_LIVE_COMBO_ID}" \
            "MARKET_VELOCITY_TASK_READINESS_CREDENTIAL_ID=${MARKET_VELOCITY_TASK_READINESS_CREDENTIAL_ID}" \
            "MARKET_VELOCITY_SIGNAL_EVENT_ID=${MARKET_VELOCITY_SIGNAL_EVENT_ID}" \
            "MARKET_VELOCITY_SIGNAL_LOOKBACK_HOURS=${MARKET_VELOCITY_SIGNAL_LOOKBACK_HOURS}" \
            "MARKET_VELOCITY_LIVE_CANDIDATE_LIMIT=${MARKET_VELOCITY_LIVE_CANDIDATE_LIMIT}" \
            bash -s -- \
            "${SERVER_APP_PATH}" \
            "${remote_compose_file}" <<'REMOTE'
          set -euo pipefail

          server_app_path="$1"
          compose_file="$2"
          cd "${server_app_path}"
          container_id="$(docker ps -q --filter "name=^/quant-core-market-velocity-live-handoff-scheduler$" | head -n 1 || true)"
          if [ -z "${container_id}" ]; then
            echo "quant-core-market-velocity-live-handoff-scheduler is not running" >&2
            docker compose \
              --project-directory "${server_app_path}" \
              --profile live-handoff-scheduler \
              -f "${compose_file}" \
              ps --all quant-core-market-velocity-live-handoff-scheduler >&2 || true
            exit 1
          fi

          echo "market_velocity_production_gate: container=quant-core-market-velocity-live-handoff-scheduler"
          echo "market_velocity_production_gate: run_once=true"

          set +e
          docker exec \
            -e MARKET_VELOCITY_LIVE_HANDOFF_RUN_ONCE=true \
            -e MARKET_VELOCITY_LIVE_BUYER_EMAIL \
            -e MARKET_VELOCITY_LIVE_COMBO_ID \
            -e MARKET_VELOCITY_TASK_READINESS_CREDENTIAL_ID \
            -e MARKET_VELOCITY_SIGNAL_EVENT_ID \
            -e MARKET_VELOCITY_SIGNAL_LOOKBACK_HOURS \
            -e MARKET_VELOCITY_LIVE_CANDIDATE_LIMIT \
            "${container_id}" \
            market_velocity_live_handoff |
            sed -E 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+/[email-redacted]/g'
          status="${PIPESTATUS[0]}"
          set -e

          if [ "${status}" -ne 0 ]; then
            echo "market_velocity_production_gate: rust gate failed, printing redacted scheduler diagnostics" >&2
            docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "${container_id}" |
              grep -E '^(APP_ENV|QUANT_CORE_DATABASE_URL|DATABASE_URL|RUST_QUAN_WEB_BASE_URL|MARKET_VELOCITY_ENTRY_CANDLE_ON_DEMAND_REFRESH)=' |
              sed -E \
                -e 's#(postgres(ql)?://)[^@]+@#\1***@#g' \
                -e 's#[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+#[email-redacted]#g' >&2 || true
            echo "market_velocity_production_gate: container network diagnostics" >&2
            docker exec "${container_id}" getent hosts postgres host.docker.internal >&2 || true
            docker exec "${container_id}" curl --connect-timeout 3 --max-time 5 -sS telnet://postgres:5432 </dev/null >&2 || true
            docker exec "${container_id}" curl --connect-timeout 3 --max-time 5 -sS telnet://host.docker.internal:5432 </dev/null >&2 || true
            echo "market_velocity_production_gate: host postgres/docker diagnostics" >&2
            docker ps --format 'name={{.Names}} image={{.Image}} ports={{.Ports}} networks={{.Networks}}' |
              grep -Ei 'postgres|quant-core|redis|mysql' >&2 || true
            ss -ltnp 2>/dev/null | grep -E '(:5432|:8000|:6379)' >&2 || true
            docker logs --tail=160 "${container_id}" |
              sed -E \
                -e 's#(postgres(ql)?://)[^@]+@#\1***@#g' \
                -e 's/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+/[email-redacted]/g' >&2 || true
            exit "${status}"
          fi
          REMOTE
