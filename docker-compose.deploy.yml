    networks:
      - default
      - quant-core-external
    profiles:
      - observation-scheduler
    restart: unless-stopped
    command:
      - market_velocity_paper_observation
      - --paper-strategy-preset
      - momentum_03sl_20r_v5
      - --loop-interval-seconds
      - ${MARKET_VELOCITY_PAPER_OBSERVATION_INTERVAL_SECS:-21600}
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
