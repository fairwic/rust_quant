services:
  quant-core-schema-ensure:
    container_name: quant-core-schema-ensure
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    profiles:
      - schema-ensure
    restart: "no"
    command:
      - quant_core_schema_ensure
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_core=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}

  quant-core-internal-server:
    container_name: quant-core-internal-server
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:-redis://redis:6379/}
      IS_RUN_INTERNAL_SERVER: "true"
      QUANT_INTERNAL_ADDR: 0.0.0.0:5322
      EXECUTION_EVENT_SECRET: ${EXECUTION_EVENT_SECRET:?EXECUTION_EVENT_SECRET is required}

  quant-core-market-velocity-radar:
    container_name: quant-core-market-velocity-radar
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:-redis://redis:6379/}
      IS_RUN_MARKET_VELOCITY_RADAR: "true"
      MARKET_VELOCITY_RADAR_ONLY: "true"
      MARKET_VELOCITY_SCAN_INTERVAL_SECS: ${MARKET_VELOCITY_SCAN_INTERVAL_SECS:-10}
      MARKET_VELOCITY_SIGNAL_DISPATCH_MODE: ${MARKET_VELOCITY_SIGNAL_DISPATCH_MODE:-web}
      MARKET_VELOCITY_STRATEGY_SLUG: ${MARKET_VELOCITY_STRATEGY_SLUG:-market_velocity}
      MARKET_VELOCITY_SIGNAL_MIN_DELTA_RANK: ${MARKET_VELOCITY_SIGNAL_MIN_DELTA_RANK:-15}
      MARKET_VELOCITY_SIGNAL_MAX_NEW_RANK: ${MARKET_VELOCITY_SIGNAL_MAX_NEW_RANK:-30}
      MARKET_VELOCITY_SIGNAL_TREND_MIN_AVERAGE_DISTANCE_PCT: ${MARKET_VELOCITY_SIGNAL_TREND_MIN_AVERAGE_DISTANCE_PCT:-0.0}
      MARKET_VELOCITY_SIGNAL_STOP_LOSS_PCT: ${MARKET_VELOCITY_SIGNAL_STOP_LOSS_PCT:-0.03}
      MARKET_VELOCITY_SIGNAL_TAKE_PROFIT_R: ${MARKET_VELOCITY_SIGNAL_TAKE_PROFIT_R:-2.0}
      MARKET_VELOCITY_SIGNAL_MAX_HOLDING_HOURS: ${MARKET_VELOCITY_SIGNAL_MAX_HOLDING_HOURS:-48}
      MARKET_VELOCITY_SIGNAL_STRATEGY_PRESET: ${MARKET_VELOCITY_SIGNAL_STRATEGY_PRESET:-momentum_03sl_20r_v5}
      MARKET_VELOCITY_SIGNAL_ENTRY_RULE_VERSION: ${MARKET_VELOCITY_SIGNAL_ENTRY_RULE_VERSION:-rank_radar_4h_trend_15m_momentum_03sl_20r_v5}
      MARKET_VELOCITY_ENTRY_MAX_AVERAGE_DISTANCE_PCT: ${MARKET_VELOCITY_ENTRY_MAX_AVERAGE_DISTANCE_PCT:-4.0}
      MARKET_VELOCITY_SIGNAL_AUTOMATION_MODE: ${MARKET_VELOCITY_SIGNAL_AUTOMATION_MODE:-signal_only}
      MARKET_VELOCITY_SIGNAL_LIVE_ORDER_ALLOWED: ${MARKET_VELOCITY_SIGNAL_LIVE_ORDER_ALLOWED:-false}
      MARKET_VELOCITY_SIGNAL_PAPER_TRADE_REQUIRED: ${MARKET_VELOCITY_SIGNAL_PAPER_TRADE_REQUIRED:-true}
      MARKET_VELOCITY_SIGNAL_DISPATCH_TIMEOUT_SECS: ${MARKET_VELOCITY_SIGNAL_DISPATCH_TIMEOUT_SECS:-5}
      RUST_QUAN_WEB_BASE_URL: ${RUST_QUAN_WEB_BASE_URL:?RUST_QUAN_WEB_BASE_URL is required}
      EXECUTION_EVENT_SECRET: ${EXECUTION_EVENT_SECRET:?EXECUTION_EVENT_SECRET is required}
      OKX_API_KEY: ${OKX_API_KEY:-public-market-only}
      OKX_API_SECRET: ${OKX_API_SECRET:-public-market-only}
      OKX_PASSPHRASE: ${OKX_PASSPHRASE:-public-market-only}

  quant-core-market-velocity-candle-backfill-scheduler:
    container_name: quant-core-market-velocity-candle-backfill-scheduler
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    profiles:
      - candle-backfill-scheduler
    restart: unless-stopped
    command:
      - market_velocity_candle_backfill
      - --all-radar-symbols
      - --timeframe
      - ${MARKET_VELOCITY_BACKFILL_TIMEFRAME:-15m}
      - --days
      - ${MARKET_VELOCITY_BACKFILL_DAYS:-2}
      - --write
      - --request-sleep-ms
      - ${MARKET_VELOCITY_BACKFILL_REQUEST_SLEEP_MS:-150}
      - --continue-on-error
      - --loop-interval-seconds
      - ${MARKET_VELOCITY_CANDLE_BACKFILL_INTERVAL_SECS:-300}
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      MARKET_VELOCITY_BACKFILL_OKX_REST_BASE: ${MARKET_VELOCITY_BACKFILL_OKX_REST_BASE:-https://www.okx.com}
      MARKET_VELOCITY_BACKFILL_PROXY_URL: ${MARKET_VELOCITY_BACKFILL_PROXY_URL:-}
      MARKET_VELOCITY_BACKFILL_BATCH_SIZE: ${MARKET_VELOCITY_BACKFILL_BATCH_SIZE:-500}
      MARKET_VELOCITY_BACKFILL_MAX_SYMBOLS: ${MARKET_VELOCITY_BACKFILL_MAX_SYMBOLS:-}

  quant-core-market-velocity-paper-observation:
    container_name: quant-core-market-velocity-paper-observation
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    profiles:
      - observation
    restart: "no"
    command:
      - market_velocity_paper_observation
      - --paper-strategy-preset
      - momentum_03sl_20r_v5
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      RUST_QUAN_WEB_BASE_URL: ${RUST_QUAN_WEB_BASE_URL:?RUST_QUAN_WEB_BASE_URL is required}
      EXECUTION_EVENT_SECRET: ${EXECUTION_EVENT_SECRET:?EXECUTION_EVENT_SECRET is required}

  quant-core-market-velocity-paper-observation-scheduler:
