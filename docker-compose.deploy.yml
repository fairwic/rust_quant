services:
  quant-core-schema-ensure:
    container_name: quant-core-schema-ensure
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    profiles:
      - schema-ensure
    restart: "no"
    command:
      - quant_core_schema_ensure
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_core=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}

  quant-core-internal-server:
    container_name: quant-core-internal-server
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - quant-core-external
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
