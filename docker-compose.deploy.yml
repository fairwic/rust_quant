services:
  quant-core-market-velocity-radar:
    container_name: quant-core-market-velocity-radar
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:-redis://127.0.0.1:6379/}
      IS_RUN_MARKET_VELOCITY_RADAR: "true"
      MARKET_VELOCITY_RADAR_ONLY: "true"
      MARKET_VELOCITY_SCAN_INTERVAL_SECS: ${MARKET_VELOCITY_SCAN_INTERVAL_SECS:-10}
      MARKET_VELOCITY_SIGNAL_DISPATCH_MODE: ${MARKET_VELOCITY_SIGNAL_DISPATCH_MODE:-web}
      MARKET_VELOCITY_STRATEGY_SLUG: ${MARKET_VELOCITY_STRATEGY_SLUG:-market_velocity}
      MARKET_VELOCITY_SIGNAL_MIN_DELTA_RANK: ${MARKET_VELOCITY_SIGNAL_MIN_DELTA_RANK:-3}
      MARKET_VELOCITY_SIGNAL_MAX_NEW_RANK: ${MARKET_VELOCITY_SIGNAL_MAX_NEW_RANK:-50}
      MARKET_VELOCITY_SIGNAL_STOP_LOSS_PCT: ${MARKET_VELOCITY_SIGNAL_STOP_LOSS_PCT:-0.02}
      MARKET_VELOCITY_SIGNAL_DISPATCH_TIMEOUT_SECS: ${MARKET_VELOCITY_SIGNAL_DISPATCH_TIMEOUT_SECS:-5}
      RUST_QUAN_WEB_BASE_URL: ${RUST_QUAN_WEB_BASE_URL:?RUST_QUAN_WEB_BASE_URL is required}
      EXECUTION_EVENT_SECRET: ${EXECUTION_EVENT_SECRET:?EXECUTION_EVENT_SECRET is required}

  quant-core-execution-worker:
    container_name: quant-core-execution-worker
    image: ${QUANT_CORE_IMAGE:-ghcr.io/fairwic/quant-core-worker:latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      RUST_LOG: ${RUST_LOG:-rust_quant_cli=info,rust_quant_services=info}
      QUANT_CORE_DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      DATABASE_URL: ${QUANT_CORE_DATABASE_URL:?QUANT_CORE_DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:-redis://127.0.0.1:6379/}
      IS_RUN_EXECUTION_WORKER: "true"
      EXECUTION_WORKER_ONLY: "true"
      EXECUTION_WORKER_RUN_ONCE: "false"
      EXECUTION_WORKER_DRY_RUN: ${EXECUTION_WORKER_DRY_RUN:-true}
      EXECUTION_WORKER_ID: ${EXECUTION_WORKER_ID:-quant-core-worker-prod}
      EXECUTION_WORKER_LEASE_LIMIT: ${EXECUTION_WORKER_LEASE_LIMIT:-1}
      EXECUTION_WORKER_DEFAULT_EXCHANGE: ${EXECUTION_WORKER_DEFAULT_EXCHANGE:-okx}
      EXECUTION_WORKER_TASK_TYPES: ${EXECUTION_WORKER_TASK_TYPES:-execute_signal,close_position}
      EXECUTION_WORKER_TASK_STATUSES: ${EXECUTION_WORKER_TASK_STATUSES:-pending,pending_close}
      EXECUTION_WORKER_CONFIRMATION_MODE: ${EXECUTION_WORKER_CONFIRMATION_MODE:-auto}
      EXECUTION_WORKER_RECONCILIATION_ONLY: ${EXECUTION_WORKER_RECONCILIATION_ONLY:-false}
      EXECUTION_WORKER_REPORT_REPLAY_MODE: ${EXECUTION_WORKER_REPORT_REPLAY_MODE:-}
      EXECUTION_WORKER_LIVE_ORDER_CONFIRM: ${EXECUTION_WORKER_LIVE_ORDER_CONFIRM:-}
      RUST_QUAN_WEB_BASE_URL: ${RUST_QUAN_WEB_BASE_URL:?RUST_QUAN_WEB_BASE_URL is required}
      EXECUTION_EVENT_SECRET: ${EXECUTION_EVENT_SECRET:?EXECUTION_EVENT_SECRET is required}
      OKX_REQUEST_EXPIRATION_MS: ${OKX_REQUEST_EXPIRATION_MS:-}
